ns":{"A":"无突出危险区实体煤采掘","B":"突出危险区实体煤采掘","C":"石门揭煤","D":"沿空掘进"},"answer":"ABC","type":"multiple","analysis":""},{"id":"q0121","content":"矿生产技术部门编制工作面初采初放期间顶板管理安全技术措施，明确（ ）等具体要求，实现采空区顶板分段冒落。","options":{"A":"推进度","B":"切顶卸压","C":"采高控制","D":"甩采"},"answer":"ABCD","type":"multiple","analysis":""},{"id":"q0122","content":"矿井重大通风系统调整、反风演习（ ）排放瓦斯、巷道贯通等特殊作业必须由矿总工程师组织，进行安全风险评估，编制专项安全技术措施。","options":{"A":"井巷揭煤","B":"揭露老空（巷）","C":"火区密闭","D":"启封密闭"},"answer":"ABCD","type":"multiple","analysis":""},{"id":"q0123","content":"1.2MPa≤瓦斯压力＜1.5MPa或发生过喷孔的地点，要单独敷设一趟抽采管路用于打钻防喷，并安装（）在线监测装置。","options":{"A":"瓦斯","B":"流量","C":"负压","D":"氧气"},"answer":"ABC","type":"multiple","analysis":""},{"id":"q0124","content":"井巷揭穿突出煤层和在突出煤层中进行采掘作业时，必须采取（ ）、远距离爆破等安全防护措施。","options":{"A":"避难硐室","B":"反向风门","C":"矿灯","D":"压风自救装置"},"answer":"ABD","type":"multiple","analysis":""},{"id":"q0125","content":"永久密闭应当留设（ ）。","options":{"A":"放水孔","B":"观测孔","C":"措施孔","D":"抽采孔"},"answer":"ABC","type":"multiple","analysis":""},{"id":"q0126","content":"煤与瓦斯突出的安全防护措施包括(  )。","options":{"A":"炮采工作面设挡栏","B":"揭穿突出煤层采取远距离爆破","C":"设两道牢固可靠的反向风门","D":"设置采区避难所、工作面避难所或压风自救系统"},"answer":"ABCD","type":"multiple","analysis":""},{"id":"q0127","content":"“安全为了生产，生产必须安全”与“安全第一”的精神是一致的。","options":{"A":"对","B":"错"},"answer":"A","type":"judge","analysis":""},{"id":"q0128","content":"“三违”即集团公司规定的安全管理红线、煤业公司规定的较严重三违和一般三违。","options":{"A":"对","B":"错"},"answer":"A","type":"judge","analysis":""},{"id":"q0129","content":"安全管理的主要目的是保护国家矿产资源，使本企业的财产、生产设备免遭损失。","options":{"A":"对","B":"错"},"answer":"B","type":"judge","analysis":""},{"id":"q0130","content":"安全警示标志，能及时提醒从业人员注意危险，防止从业人员发生事故，因此对其设置应越多越好。","options":{"A":"对","B":"错"},"answer":"B","type":"judge","analysis":""},{"id":"q0131","content":"安全生产事故都是可以预防的。","options":{"A":"对","B":"错"},"answer":"A","type":"judge","analysis":""},{"id":"q0132","content":"安全生产责任制是“安全第一，预防为主，综合治理”方针的具体体现，是煤矿企业最基本的安全管理制度。","options":{"A":"对","B":"错"},"answer":"A","type":"judge","analysis":""},{"id":"q0133","content":"把作业场所和工作岗位存在的危险因素，如实告知从业人员，会有负面影响，增加思想负担，不利于安全生产。","options":{"A":"对","B":"错"},"answer":"B","type":"judge","analysis":""},{"id":"q0134","content":"搬运和转送颈部、腰部以及关节、四肢有损伤的伤员时，应先固定，避免弯曲和扭转，以免加重损伤。","options":{"A":"对","B":"错"},"answer":"A","type":"judge","analysis":""},{"id":"q0135","content":"不良的情绪状态(如过度的情绪低落或高涨)是导致行为失误、引起事故发生的极其重要的因素。","options":{"A":"对","B":"错"},"answer":"A","type":"judge","analysis":""},{"id":"q0136","content":"尘肺病可预防而不可治愈，尘肺病患者随着年龄的增加，病情会逐步减轻。","options":{"A":"对","B":"错"},"answer":"B","type":"judge","analysis":""},{"id":"q0137","content":"抽采钻场（钻孔）各作业班均应有观测记录，各种记录要准确、台帐要齐全。","options":{"A":"对","B":"错"},"answer":"A","type":"judge","analysis":""},{"id":"q0138","content":"从业人员必须遵守煤矿安全生产规章制度、作业规程和操作规程，严禁违章指挥、违章作业。","options":{"A":"对","B":"错"},"answer":"A","type":"judge","analysis":""},{"id":"q0139","content":"从业人员发现事故隐患或者其他不安全因素，应当立即向现场安全生产管理人员或者本单位负责人报告。","options":{"A":"对","B":"错"},"answer":"A","type":"judge","analysis":""},{"id":"q0140","content":"从业人员发现直接危及人身安全的紧急情况时，要留部分人员采取措施，不得擅自撤离作业场所。","options":{"A":"对","B":"错"},"answer":"B","type":"judge","analysis":""},{"id":"q0141","content":"急停按钮通过控制常闭触电，使电路断开。","options":{"A":"对","B":"错"},"answer":"A","type":"judge","analysis":""},{"id":"q0142","content":"力的作用方向和物体上力作用点的运动方向夹角，称为压力角。","options":{"A":"对","B":"错"},"answer":"A","type":"judge","analysis":""},{"id":"q0143","content":"泵和马达可以通过调节内部斜盘角度，从而调节排量。","options":{"A":"对","B":"错"},"answer":"A","type":"judge","analysis":""},{"id":"q0144","content":"钻机冷却水的压力应不大于2mpa，大了会损坏冷却器。","options":{"A":"对","B":"错"},"answer":"B","type":"judge","analysis":""},{"id":"q0145","content":"降低沿程压力损失的方法通常有增大管长，减小管径。","options":{"A":"对","B":"错"},"answer":"B","type":"judge","analysis":""},{"id":"q0146","content":"自动钻机的动力总成包括电动机、连接套、主泵和副泵，其中靠近电动机的泵是主泵。","options":{"A":"对","B":"错"},"answer":"A","type":"judge","analysis":""},{"id":"q0147","content":"主机械手在垂直状态时主机械手倾角变化被称为倾角增大、倾角减小，在水平状态时主机械手倾角变化被称为上摆、下摆。","options":{"A":"对","B":"错"},"answer":"A","type":"judge","analysis":""},{"id":"q0148","content":"副机械手的手爪伸向钻杆箱的动作被称为伸出，离开钻杆箱的动作被称为缩回。","options":{"A":"对","B":"错"},"answer":"A","type":"judge","analysis":""},{"id":"q0149","content":"自动钻机运行一段时间后，副机械手最远端的晃动距离超过了10mm，应首先考虑更换平键。","options":{"A":"对","B":"错"},"answer":"A","type":"judge","analysis":""},{"id":"q0150","content":"动力头滑块属于易损件，与导轨的间隙超过3mm时，应进行更换。","options":{"A":"对","B":"错"},"answer":"A","type":"judge","analysis":""},{"id":"q0151","content":"图中箭头所指的组件是行走切换阀组，其作用是切换副车行走和钻进状态，也可调节节流阀对副车行走的速度调节。","options":{"A":"对","B":"错"},"answer":"A","type":"judge","analysis":""},{"id":"q0152","content":"双夹持器油缸：用于双夹持器的夹紧和松开。","options":{"A":"对","B":"错"},"answer":"A","type":"judge","analysis":""},{"id":"q0153","content":"给进油缸：用于动力头的前进与后退动作，输出给进力和给进速度。","options":{"A":"对","B":"错"},"answer":"A","type":"judge","analysis":""},{"id":"q0154","content":"动力头在最后端的位移值应为10mm（±2mm），副机械手水平和垂直的初始位移值均应为10mm（±2mm）。","options":{"A":"对","B":"错"},"answer":"A","type":"judge","analysis":""},{"id":"q0155","content":"全方位自动钻机传感器总装共有15个传感器，其中接近开关6个，转速传感器1个，位移传感器4个， 压力传感器5个。","options":{"A":"对","B":"错"},"answer":"B","type":"judge","analysis":""},{"id":"q0156","content":"当金属靠近接近开关时灯亮，但是电控箱上不显示红色（显示屏无故障）， 机器仍不能自动运行，因为信号未传入控制器。","options":{"A":"对","B":"错"},"answer":"A","type":"judge","analysis":""},{"id":"q0157","content":"若天线进水或接触不良会导致遥控器屏幕数据时有时无。","options":{"A":"对","B":"错"},"answer":"A","type":"judge","analysis":""},{"id":"q0158","content":"自动钻机电控系统由遥控器、接收器、电控箱、传感器、电磁阀、电磁启动器组成。","options":{"A":"对","B":"错"},"answer":"A","type":"judge","analysis":""},{"id":"q0159","content":"电磁启动器控制电机，并为钻机电控系统供电。","options":{"A":"对","B":"错"},"answer":"A","type":"judge","analysis":""},{"id":"q0160","content":"传感器采集钻机相关参数，不反馈给控制器。","options":{"A":"对","B":"错"},"answer":"B","type":"judge","analysis":""},{"id":"q0161","content":"电控箱包含控制器、控制模块、开关电源、本安电源、安全栅、继电器及显示屏。","options":{"A":"对","B":"错"},"answer":"A","type":"judge","analysis":""},{"id":"q0162","content":"遥控器向钻机发出控制信号。接收器接受遥控器的控制信号并发送，并传输给控制器。","options":{"A":"对","B":"错"},"answer":"B","type":"judge","analysis":""},{"id":"q0163","content":"压力传感器位于多路阀上端，主要用于检测大泵、小泵、推进、主机械手、副机械手的压力。","options":{"A":"对","B":"错"},"answer":"A","type":"judge","analysis":""},{"id":"q0164","content":"动力头位移传感器位于机架左前端，用于检测动力头位移。","options":{"A":"对","B":"错"},"answer":"B","type":"judge","analysis":""},{"id":"q0165","content":"副机械手水平位移传感器位于副机械手齿条后端，用于副机械手水平位移精确定位（全方位）。","options":{"A":"对","B":"错"},"answer":"A","type":"judge","analysis":""},{"id":"q0166","content":"副机械手垂直位移传感器位于副机械手伸缩套筒上端，与接近开关5配合，用于副机械手伸出的精确定位（全方位）。","options":{"A":"对","B":"错"},"answer":"A","type":"judge","analysis":""},{"id":"q0167","content":"机架高度位移传感器位于左机架提升套筒旁，不可用于检测机架高度（全方位）。","options":{"A":"对","B":"错"},"answer":"B","type":"judge","analysis":""},{"id":"q0168","content":"操作人员操作履带车上坡和下坡时一定要站在钻机下坡方向。","options":{"A":"对","B":"错"},"answer":"B","type":"judge","analysis":""},{"id":"q0169","content":"在启动钻机前，操作人员应通知所有人员注意安全，仔细检查电路电缆，检验漏电保护装置状态，只有在确认人员和设备人都安全后，方可启动钻机运转。","options":{"A":"对","B":"错"},"answer":"A","type":"judge","analysis":""},{"id":"q0170","content":"打运钻机，如坡度大于5度或地面有浮煤必须采用绞车牵引，否则容易导致履带钻机向下滑动，倾斜或翻车而引起事故。","options":{"A":"对","B":"错"},"answer":"A","type":"judge","analysis":""},{"id":"q0171","content":"调整方位角及水平高度时一定要慢慢推动手把，可以突然推动（或拉动）手把， 使得机架升降过快而引起安全事故。","options":{"A":"对","B":"错"},"answer":"B","type":"judge","analysis":""},{"id":"q0172","content":"开机前的准备工作：检查各个液压元件的安装及其管道连接是否正确且牢固可靠；各液压元件手柄是否置于正确位置，尤其油箱吸油口蝶阀是否打开；油箱油位是否符合要求；旋转或直线运动部件附近是否有障碍。","options":{"A":"对","B":"错"},"answer":"A","type":"judge","analysis":""},{"id":"q0173","content":"“安全为了生产，生产必须安全”与“安全第一”的精神是一致的。","options":{"A":"对","B":"错"},"answer":"A","type":"judge","analysis":""},{"id":"q0174","content":"“三违”即集团公司规定的安全管理红线、煤业公司规定的较严重三违和一般三违。","options":{"A":"对","B":"错"},"answer":"A","type":"judge","analysis":""},{"id":"q0175","content":"安全管理的主要目的是保护国家矿产资源，使本企业的财产、生产设备免遭损失。","options":{"A":"对","B":"错"},"answer":"B","type":"judge","analysis":""},{"id":"q0176","content":"安全警示标志，能及时提醒从业人员注意危险，防止从业人员发生事故，因此对其设置应越多越好。","options":{"A":"对","B":"错"},"answer":"B","type":"judge","analysis":""},{"id":"q0177","content":"安全生产事故都是可以预防的。","options":{"A":"对","B":"错"},"answer":"A","type":"judge","analysis":""},{"id":"q0178","content":"安全生产责任制是“安全第一，预防为主，综合治理”方针的具体体现，是煤矿企业最基本的安全管理制度。","options":{"A":"对","B":"错"},"answer":"A","type":"judge","analysis":""},{"id":"q0179","content":"把作业场所和工作岗位存在的危险因素，如实告知从业人员，会有负面影响，增加思想负担，不利于安全生产。","options":{"A":"对","B":"错"},"answer":"B","type":"judge","analysis":""},{"id":"q0180","content":"班组人员被查出触犯安全管理红线的，给予班（队）长撤职处分、300元罚款。","options":{"A":"对","B":"错"},"answer":"B","type":"judge","analysis":""},{"id":"q0181","content":"搬运和转送颈部、腰部以及关节、四肢有损伤的伤员时，应先固定，避免弯曲和扭转，以免加重损伤。","options":{"A":"对","B":"错"},"answer":"A","type":"judge","analysis":""},{"id":"q0182","content":"不良的情绪状态(如过度的情绪低落或高涨)是导致行为失误、引起事故发生的极其重要的因素。","options":{"A":"对","B":"错"},"answer":"A","type":"judge","analysis":""},{"id":"q0183","content":"煤巷条带穿层预抽钻孔在断层构造带前后10m加密。","options":{"A":"对","B":"错"},"answer":"B","type":"judge","analysis":""},{"id":"q0184","content":"断层带附近可采用水力压裂增透。","options":{"A":"对","B":"错"},"answer":"B","type":"judge","analysis":""},{"id":"q0185","content":"预抽钻孔开孔方位角误差不得超过 ±2°。","options":{"A":"对","B":"错"},"answer":"B","type":"judge","analysis":""},{"id":"q0186","content":"开孔前钻机残尺原则上不得超过 1.5m。","options":{"A":"对","B":"错"},"answer":"B","type":"judge","analysis":""},{"id":"q0187","content":"孔深＞120m 的顶板钻孔每 60m 测斜 1 次。","options":{"A":"对","B":"错"},"answer":"A","type":"judge","analysis":""},{"id":"q0188","content":"每个钻场地质探查钻孔不少于 2 个。","options":{"A":"对","B":"错"},"answer":"B","type":"judge","analysis":""},{"id":"q0189","content":"孔深 60～120m 的预抽钻孔每 10 个至少测斜 2 个。","options":{"A":"对","B":"错"},"answer":"B","type":"judge","analysis":""},{"id":"q0190","content":"同一钻孔轨迹测点间距≤4m。","options":{"A":"对","B":"错"},"answer":"A","type":"judge","analysis":""},{"id":"q0191","content":"区域预抽钻孔套管下置深度≥85% 钻孔深度。","options":{"A":"对","B":"错"},"answer":"A","type":"judge","analysis":""},{"id":"q0192","content":"Φ25mm PVC 管筛眼孔径为 Φ10mm。","options":{"A":"对","B":"错"},"answer":"B","type":"judge","analysis":""},{"id":"q0193","content":"预抽钻孔封孔注浆压力≥1.0MPa。","options":{"A":"对","B":"错"},"answer":"B","type":"judge","analysis":""},{"id":"q0194","content":"突出危险区顺层预抽钻孔需安装吹水通气管。","options":{"A":"对","B":"错"},"answer":"A","type":"judge","analysis":""},{"id":"q0195","content":"瓦斯含量≥8m³/t 时单孔浓度≥50%。","options":{"A":"对","B":"错"},"answer":"A","type":"judge","analysis":""},{"id":"q0196","content":"顺层钻孔见煤率≥70% 按实际孔深验收。","options":{"A":"对","B":"错"},"answer":"B","type":"judge","analysis":""},{"id":"q0197","content":"预抽评价期内钻孔每 15 天实测 1 次数据。","options":{"A":"对","B":"错"},"answer":"A","type":"judge","analysis":""},{"id":"q0198","content":"抽采泵站无需专人值守，定期巡查即可。","options":{"A":"对","B":"错"},"answer":"B","type":"judge","analysis":""},{"id":"q0199","content":"矿井每旬对抽采主干管巡查 1 次。","options":{"A":"对","B":"错"},"answer":"A","type":"judge","analysis":""},{"id":"q0200","content":"打钻视频探头中断 20 分钟需记录原因。","options":{"A":"对","B":"错"},"answer":"B","type":"judge","analysis":""},{"id":"q0201","content":"专人验收模式举牌展示时间≥3 秒。","options":{"A":"对","B":"错"},"answer":"B","type":"judge","analysis":""},{"id":"q0202","content":"孔板进气侧直管段长度≥10 倍管径。","options":{"A":"对","B":"错"},"answer":"A","type":"judge","analysis":""},{"id":"q0203","content":"矿每月对自动计量装置巡查 1 次。","options":{"A":"对","B":"错"},"answer":"B","type":"judge","analysis":""},{"id":"q0204","content":"抽采计量误差超过 5% 以低值为准。","options":{"A":"对","B":"错"},"answer":"A","type":"judge","analysis":""},{"id":"q0205","content":"预抽钻孔孔口负压≥13kPa。","options":{"A":"对","B":"错"},"answer":"A","type":"judge","analysis":""},{"id":"q0206","content":"老空积水其特点是来势猛、持续时间短、破坏性强、危害程度大，伴有有害气体的涌出。","options":{"A":"对","B":"错"},"answer":"A","type":"judge","analysis":""},{"id":"q0207","content":"底板灰岩水害其特点是突发性强、水量大、持续时间长、危害面广。","options":{"A":"对","B":"错"},"answer":"A","type":"judge","analysis":""},{"id":"q0208","content":"钻孔异常出水时必须立即停止钻进，但不得拔出钻杆。","options":{"A":"对","B":"错"},"answer":"A","type":"judge","analysis":""},{"id":"q0209","content":"按事故大小可分为局部冒顶、大面积切顶垮塌事故；顶板事故可能造成埋人、堵人等重大 采方法，以提高开采效率。（  ）","options":{"A":"对","B":"错"},"answer":"A","type":"judge","analysis":""},{"id":"q0223","content":"突出煤层的采掘工作面在作业前，只需进行一次突出危险性预测，无需进行连续预测。（  ）","options":{"A":"对","B":"错"},"answer":"A","type":"judge","analysis":""},{"id":"q0224","content":"预测预报是煤矿防突工作的基础，通过预测预报可以及时发现突出危险，并采取相应措施进行防治。（  ）","options":{"A":"对","B":"错"},"answer":"A","type":"judge","analysis":""},{"id":"q0225","content":"煤矿企业应当定期对突出煤层进行区域突出危险性预测，并根据预测结果采取相应的防治措施。（  ）","options":{"A":"对","B":"错"},"answer":"A","type":"judge","analysis":""},{"id":"q0226","content":"防治煤与瓦斯突出的措施中，开采保护层是一种有效的区域防突措施，可以降低突出危险性。（  ）","options":{"A":"对","B":"错"},"answer":"A","type":"judge","analysis":""}]'),xi="exam_wrong_questions",cl="exam_questions",ul="exam_filename",Gc="exam_practice";function _l(e,r){try{const t=localStorage.getItem(e);if(t)return JSON.parse(t)}catch{}return r}function ia(e,r){try{localStorage.setItem(e,JSON.stringify(r))}catch{}}function kl(e){try{localStorage.removeItem(e)}catch{}}const Bl=pu((e,r)=>({questions:[],filename:"",isLoading:!1,error:null,loadBuiltin:()=>{const t=Gv;e({questions:t,filename:"新分人员考试题库"}),ia(cl,t),ia(ul,"新分人员考试题库")},loadFromFile:async t=>{e({isLoading:!0,error:null});try{const{parseExcelFile:i}=await Wv(async()=>{const{parseExcelFile:l}=await Promise.resolve().then(()=>sk);return{parseExcelFile:l}},void 0,import.meta.url),s=await i(t);e({questions:s.questions,filename:s.filename,isLoading:!1}),ia(cl,s.questions),ia(ul,s.filename)}catch(i){e({error:i instanceof Error?i.message:"解析失败",isLoading:!1})}},clearQuestions:()=>{e({questions:[],filename:"",error:null}),kl(cl),kl(ul)},getRandomQuestions:t=>{const i=[...r().questions].sort(()=>Math.random()-.5);return i.slice(0,Math.min(t,i.length))},restoreFromStorage:()=>{const t=_l(cl,[]),i=_l(ul,"");t.length>0?e({questions:t,filename:i}):r().loadBuiltin()}})),ys=pu((e,r)=>({wrongQuestions:[],addWrongQuestion:t=>{if(r().wrongQuestions.find(s=>s.id===t.id)){const s=r().wrongQuestions.map(l=>l.id===t.id?{...l,wrongAnswer:t.wrong .trae-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
  font-weight: 500;
  transition: all 0.2s ease;
  cursor: pointer;
  box-sizing: border-box;
  border-radius: 6px;
  position: fixed;
  padding: 8px 8px 8px 10px;
  height: 28px;
  width: 130px;
  z-index: 9999;
}

.trae-badge:hover.trae-badge--light {
  background-color: #EDEFF2;
}

.trae-badge:hover.trae-badge--dark {
  background-color: #2A2D31;
}

.trae-badge-content {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
}

.trae-badge-logo {
  flex-shrink: 0;
}

.trae-badge-share {
  flex-shrink: 0;
  color: rgba(78, 82, 87, 1);
}

.trae-badge:hover.trae-badge--light .trae-badge-share {
  color: rgba(38, 41, 44, 1);
}

.trae-badge:hover.trae-badge--dark .trae-badge-share {
  color: #D1D3DB;
}

.trae-badge-cancel {
  position: absolute;
  top: -8px;
  right: -8px;
  width: 16px;
  height: 16px;
  cursor: pointer;
  opacity: 0;
  visibility: hidden;
  z-index: 10001;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #000000;
}

.trae-badge:hover .trae-badge-cancel {
  opacity: 1 !important;
  visibility: visible !important;
}

/* 在移动端设备上始终显示取消按钮 */
@media (hover: none) and (pointer: coarse) {
  .trae-badge-cancel {
    opacity: 1 !important;
    visibility: visible !important;
  }
}

.trae-badge--light {
  background-color: rgba(255, 255, 255, 1);
  color: #ffffff;
  box-shadow: 0px 0px 0.5px 0px rgba(0, 0, 0, 0.12), 0px 1px 3px 0px rgba(0, 0, 0, 0.08), 0px 4px 8px 0px rgba(0, 0, 0, 0.12);
}

.trae-badge--dark {
  background-color: #000000;
  color: #ffffff;
  box-shadow: 0px 0px 0.5px 0px rgba(0, 0, 0, 0.12), 0px 1px 3px 0px rgba(0, 0, 0, 0.08), 0px 4px 8px 0px rgba(0, 0, 0, 0.12);
}

.trae-badge--bottom-right { bottom: 20px; right: 20px; }
.trae-badge--bottom-left { bottom: 20px; left: 20px; }
.trae-badge--top-right { top: 20px; right: 20px; }
.trae-badge--top-left { top: 20px; left: 20px; }
`;

          function getLuminance(r, g, b) {
            return 0.299 * r + 0.587 * g + 0.114 * b;
          }
          
          function parseColor(color) {
            const rgbaMatch = color.match(/rgba?\((\d+),\s*(\d+),\s*(\d+)(?:,\s*[\d.]+)?\)/);
            if (rgbaMatch) {
              return [parseInt(rgbaMatch[1]), parseInt(rgbaMatch[2]), parseInt(rgbaMatch[3])];
            }
            
            const hexMatch = color.match(/^#([0-9a-f]{6})$/i);
            if (hexMatch) {
              const hex = hexMatch[1];
              return [
                parseInt(hex.substr(0, 2), 16),
                parseInt(hex.substr(2, 2), 16),
                parseInt(hex.substr(4, 2), 16)
              ];
            }
            
            const hexShortMatch = color.match(/^#([0-9a-f]{3})$/i);
            if (hexShortMatch) {
              const hex = hexShortMatch[1];
              return [
                parseInt(hex[0] + hex[0], 16),
                parseInt(hex[1] + hex[1], 16),
                parseInt(hex[2] + hex[2], 16)
              ];
            }
            
            return null;
          }
          
          function detectBackgroundColor(element) {
            let targetElement;
            
            if (typeof element === 'string') {
              const found = document.querySelector(element);
              console.debug('Target element found:', found);
              if (!found) return 'rgb(255, 255, 255)';
              targetElement = found;
            } else if (element) {
              targetElement = element;
            } else {
              targetElement = document.body;
            }
            
            let currentElement = targetElement;
            
            while (currentElement && currentElement !== document.documentElement) {
              const computedStyle = window.getComputedStyle(currentElement);
              const backgroundColor = computedStyle.backgroundColor;
              
              console.debug('Checking element:', currentElement.tagName, currentElement.id, currentElement.className);
              console.debug('Background color:', backgroundColor);
              
              if (backgroundColor && backgroundColor !== 'rgba(0, 0, 0, 0)' && backgroundColor !== 'transparent') {
                console.debug('Found background color:', backgroundColor, 'on element:', currentElement);
                return backgroundColor;
              }
              
              currentElement = currentElement.parentElement;
            }
            
            const bodyStyle = window.getComputedStyle(document.body);
            const bodyBackground = bodyStyle.backgroundColor;
            console.debug('Body background:', bodyBackground);
            if (bodyBackground && bodyBackground !== 'rgba(0, 0, 0, 0)' && bodyBackground !== 'transparent') {
              return bodyBackground;
            }
            
            const htmlStyle = window.getComputedStyle(document.documentElement);
            const htmlBackground = htmlStyle.backgroundColor;
            console.debug('HTML background:', htmlBackground);
            if (htmlBackground && htmlBackground !== 'rgba(0, 0, 0, 0)' && htmlBackground !== 'transparent') {
              return htmlBackground;
            }
            
            console.debug('No background found, returning default white');
            return 'rgb(255, 255, 255)';
          }
          
          function autoSelectTheme(container) {
            const backgroundColor = detectBackgroundColor(container);
            const rgb = parseColor(backgroundColor);
            
            console.debug('TRAE Badge Plugin - Background detection:', {
              container,
              backgroundColor,
              rgb
            });
            
            if (!rgb) {
              console.debug('TRAE Badge Plugin - No RGB found, using dark theme');
              return 'dark';
            }
            
            const [r, g, b] = rgb;
            const luminance = getLuminance(r, g, b);
            const selectedTheme = luminance > 128 ? 'dark' : 'light';
            
            console.debug('TRAE Badge Plugin - Theme selection:', {
              luminance,
              selectedTheme,
              reason: luminance > 128 ? 'Light background -> Dark badge' : 'Dark background -> Light badge'
            });
            
            return selectedTheme;
          }
        
              
              // 注入样式
              const style = document.createElement('style');
              style.id = 'trae-badge-plugin-styles';
              style.textContent = css;
              document.head.appendChild(style);
              
              // 创建 Badge 函数
              function createBadge() {
                // 移除已存在的 badge
                const existingBadge = document.getElementById('trae-badge-plugin');
                if (existingBadge) {
                  existingBadge.remove();
                }
                
                // 确定主题
                let variant = 'dark';
                if (true) {
                  variant = autoSelectTheme('#root');
                }
                
                const isDarkBackground = variant === 'dark';
                const logoType = isDarkBackground ? 'light' : 'dark';
                const cancelIcon = isDarkBackground ? cancelLight : cancelDark;
                
                const badge = document.createElement('div');
                badge.id = 'trae-badge-plugin';
                badge.className = `trae-badge trae-badge--${variant} trae-badge--bottom-right`;
                badge.innerHTML = `
                  <div class="trae-badge-content">
                    <div class="trae-badge-logo">${logos[logoType]}</div>
                    <div class="trae-badge-share">${shareIcon}</div>
                  </div>
                  <div class="trae-badge-cancel">${cancelIcon}</div>
                `;
                
                // 添加点击事件
                
                badge.style.cursor = 'pointer';
                badge.addEventListener('click', (e) => {
                  if (e.target.closest('.trae-badge-cancel')) return;
                  window.open('https://www.trae.ai/solo?showJoin=1', '_blank');
                });
                
                
                // 添加取消按钮事件
                const cancelButton = badge.querySelector('.trae-badge-cancel');
                if (cancelButton) {
                  cancelButton.addEventListener('click', (e) => {
                    e.stopPropagation();
                    badge.remove();
                  });
                }
                
                document.body.appendChild(badge);
                return badge;
              }
              
              // 初始创建 badge
              // 等待 React 组件渲染完成后再创建 badge
              function initBadge() {
                // 使用 requestAnimationFrame 等待渲染完成
                requestAnimationFrame(() => {
                  // 再次检查目标元素是否存在
                  const targetElement = document.querySelector('#root');
                  if (targetElement) {
                    const badge = createBadge();
                  } else {
                    // 如果还没有找到，等待一段时间再试
                    setTimeout(() => {
                      const badge = createBadge();
                    }, 500);
                  }
                });
              }
              
              if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', initBadge);
              } else {
                // DOM 已经加载完成，但 React 可能还没渲染
                initBadge();
              }
              
              window.TraeBadgePlugin = { 
                destroy: () => {
                  const badge = document.getElementById('trae-badge-plugin');
                  if (badge) badge.remove();
                  style.remove();
                  delete window.TraeBadgePlugin;
                },
                recreate: createBadge
              };
            })();
          </script>
        
</body>
